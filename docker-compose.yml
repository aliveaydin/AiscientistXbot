services:
  bot:
    build: .
    container_name: aiscientist-bot
    restart: always
    expose:
      - "8000"
    ports:
      - "8080:8000"
    volumes:
      - bot-data:/app/data
    env_file:
      - .env.production
    environment:
      - DATA_DIR=/app/data
      - ARTICLES_DIR=/app/data/articles
      - DATABASE_URL=sqlite+aiosqlite:////app/data/bot.db
      - FRONTEND_DIST_DIR=./frontend_dist

  rlforge:
    build:
      context: .
      dockerfile: Dockerfile.rlforge
      args:
        NEXT_PUBLIC_API_URL: http://bot:8000
    container_name: kualia-platform
    restart: always
    expose:
      - "3001"
    depends_on:
      - bot

  nginx:
    image: nginx:alpine
    container_name: kualia-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bot
      - rlforge

volumes:
  bot-data:

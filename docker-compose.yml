services:
  bot:
    build: .
    container_name: aiscientist-bot
    restart: always
    expose:
      - "8000"
    ports:
      # Bind to loopback only — nginx reaches the bot via the internal docker
      # network (bot:8000); the public host port would otherwise bypass nginx
      # (TLS, Basic Auth, admin gateway).
      - "127.0.0.1:8080:8000"
    volumes:
      - bot-data:/app/data
    env_file:
      - .env.production
    environment:
      - DATA_DIR=/app/data
      - ARTICLES_DIR=/app/data/articles
      - DATABASE_URL=sqlite+aiosqlite:////app/data/bot.db
      - FRONTEND_DIST_DIR=./frontend_dist
      - CLERK_ISSUER=https://clerk.kualia.ai

  rlforge:
    build:
      context: .
      dockerfile: Dockerfile.rlforge
      args:
        NEXT_PUBLIC_API_URL: http://bot:8000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsua3VhbGlhLmFpJA
    container_name: kualia-platform
    restart: always
    expose:
      - "3001"
    env_file:
      - .env.production
    depends_on:
      - bot

  nginx:
    image: nginx:alpine
    container_name: kualia-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/admin_gateway.conf:/etc/nginx/admin_gateway.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - bot
      - rlforge

volumes:
  bot-data:

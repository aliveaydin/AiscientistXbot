events {
    worker_connections 1024;
}

http {
    upstream bot {
        server bot:8000;
    }

    upstream rlforge {
        server rlforge:3001;
    }

    # kualia.ai - main platform (replaces both old website and rlforge)
    server {
        listen 80;
        server_name kualia.ai www.kualia.ai _;

        # All API calls go to bot backend
        location /api/ {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Everything else goes to rlforge Next.js platform
        location / {
            proxy_pass http://rlforge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin panel
    server {
        listen 80;
        server_name admin.kualia.ai;

        location / {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

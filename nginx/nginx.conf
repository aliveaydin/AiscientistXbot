events {
    worker_connections 1024;
}

http {
    upstream bot {
        server bot:8000;
    }

    upstream rlforge {
        server rlforge:3001;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name kualia.ai www.kualia.ai admin.kualia.ai;
        return 301 https://$host$request_uri;
    }

    # kualia.ai - main platform (HTTPS)
    server {
        listen 443 ssl;
        server_name kualia.ai www.kualia.ai;

        ssl_certificate /etc/letsencrypt/live/kualia.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kualia.ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/ {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Strip any client-supplied admin-gateway header on the public domain.
            proxy_set_header X-Kualia-Admin "";
            proxy_connect_timeout 900s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
        }

        location / {
            proxy_pass http://rlforge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # admin.kualia.ai (HTTPS + Basic Auth)
    server {
        listen 443 ssl;
        server_name admin.kualia.ai;

        ssl_certificate /etc/letsencrypt/live/kualia.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kualia.ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        auth_basic "Kualia Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Trusted admin-gateway header (real secret lives in admin_gateway.conf,
            # which is generated on the server and never committed).
            include /etc/nginx/admin_gateway.conf;
            proxy_connect_timeout 900s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
        }
    }
}
